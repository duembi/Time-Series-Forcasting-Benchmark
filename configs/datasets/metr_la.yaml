# Dataset Configuration — METR-LA (Traffic Speed)
dataset:
  name: "METR-LA"
  loader: "npz"
  path: "data/metr_la/metr_la.npz"
  data_key: "data"
  feature_idx: 0                    # 0 = traffic speed (mph)
  start_date: "2012-03-01"
  frequency: "5min"
  description: "Los Angeles highway traffic speed (207 sensors, Mar–Jun 2012)"

  adjacency:
    enabled: true
    path: "data/metr_la/adj_mx.pkl"
